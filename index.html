<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrizzio - Tótem de Reciclaje Eco-Beauty</title>
    <style>
        /* --- VARIABLES DE DISEÑO (Estilo Petrizzio) --- */
        :root {
            --color-primary: #111111; /* Negro elegante moderno */
            --color-accent: #d4af37;  /* Dorado premium */
            --color-bg: #f9f6f0;      /* Blanco hueso/crema suave */
            --color-card: #ffffff;
            --color-success: #2e7d32; /* Verde reciclaje */
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--color-bg);
            color: var(--color-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- CONTENEDOR PRINCIPAL (Interfaz del Tótem) --- */
        .totem-container {
            width: 100%;
            max-width: 800px;
            background: var(--color-card);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 2px solid #eaeaea;
        }

        /* Encabezado */
        .totem-header {
            background-color: var(--color-primary);
            color: #ffffff;
            text-align: center;
            padding: 30px 20px;
        }

        .totem-header h1 {
            font-size: 2.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .totem-header p {
            color: var(--color-accent);
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* Cuerpo del Tótem */
        .totem-content {
            padding: 40px 30px;
        }

        /* Sección de Simulación de Escáner */
        .scanner-section {
            background: #f0f0f0;
            border: 3px dashed var(--color-accent);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin-bottom: 40px;
        }

        .scanner-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .btn-scan {
            background-color: var(--color-primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .btn-scan:hover {
            background-color: var(--color-accent);
            color: var(--color-primary);
        }

        /* Contador de Envases */
        .counter-display {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            background-color: #e8f5e9;
            color: var(--color-success);
            border-radius: 12px;
            font-weight: bold;
        }

        /* --- SECCIÓN RECOMPENSAS (Dinámica) --- */
        .rewards-section {
            display: none; /* Se activa con JS */
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .rewards-title {
            text-align: center;
            font-size: 1.6rem;
            margin-bottom: 25px;
            color: var(--color-primary);
            border-bottom: 2px solid var(--color-accent);
            padding-bottom: 10px;
        }

        /* Opciones de premios */
        .reward-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .reward-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .reward-card:hover {
            transform: scale(1.03);
            border-color: var(--color-primary);
        }

        .reward-card.selected {
            border-color: var(--color-success);
            background-color: #f1f8e9;
        }

        .reward-card h4 {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        /* Botón de Retirar */
        .btn-claim {
            display: block;
            width: 100%;
            background-color: var(--color-success);
            color: white;
            border: none;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-claim:hover {
            background-color: #1b5e20;
        }

        .btn-reset {
            display: block;
            margin: 20px auto 0;
            background: none;
            border: none;
            color: #777;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="totem-container">
        <header class="totem-header">
            <h1>PETRIZZIO</h1>
            <p>Eco-Beauty: Recicla tus Envases de Maquillaje</p>
        </header>

        <main class="totem-content">
            
            <section class="scanner-section">
                <p class="scanner-title">📥 Introduce un envase en la apertura inferior para escanear:</p>
                <button class="btn-scan" onclick="scanProduct('Maquillaje Trío')">+ Maquillaje Trío</button>
                <button class="btn-scan" onclick="scanProduct('Polvo Traslúcido')">+ Polvo Traslúcido</button>
                <button class="btn-scan" onclick="scanProduct('Paleta Correctora')">+ Paleta Correctora</button>
            </section>

            <div class="counter-display" id="counterDisplay">
                Envases escaneados: <span id="count">0</span>
            </div>

            <section class="rewards-section" id="rewardsSection">
                <h3 class="rewards-title" id="rewardTierTitle">¡Felicidades! Has desbloqueado un premio</h3>
                <p style="text-align: center; margin-bottom: 20px;">Selecciona tu recompensa preferida:</p>
                
                <div class="reward-options" id="optionsContainer">
                    </div>

                <button class="btn-claim" onclick="claimReward()">Retirar Recompensa en Dispensador</button>
                <button class="btn-reset" onclick="resetTotem()">Empezar de nuevo</button>
            </section>

        </main>
    </div>

    <script>
        let scannedCount = 0;
        let selectedReward = "";

        // Función que simula la introducción y escaneo del producto
        function scanProduct(productName) {
            scannedCount++;
            document.getElementById('count').innerText = scannedCount;
            updateRewardsLogic();
        }

        // Determina qué premio dar según las reglas de negocio
        function updateRewardsLogic() {
            const rewardsSection = document.getElementById('rewardsSection');
            const tierTitle = document.getElementById('rewardTierTitle');
            const optionsContainer = document.getElementById('optionsContainer');
            
            // Mostrar la sección de premios una vez que hay al menos 1 envase
            if (scannedCount > 0) {
                rewardsSection.style.display = 'block';
            }

            // Limpiamos opciones anteriores
            optionsContainer.innerHTML = '';
            selectedReward = "";

            if (scannedCount >= 1 && scannedCount <= 2) {
                tierTitle.innerText = "🎁 Tramo 1-2 Envases: ¡REFILL GRATIS!";
                
                // Productos base que el usuario puede elegir para el Refill
                const refills = ["Refill Maquillaje Trío", "Refill Polvo Traslúcido", "Refill Paleta Correctora"];
                refills.forEach(item => {
                    optionsContainer.innerHTML += createCardHTML(item);
                });

            } else if (scannedCount >= 3 && scannedCount <= 4) {
                tierTitle.innerText = "🎁 Tramo 3-4 Envases: ¡PREMIO A ELECCIÓN!";
                
                const midRewards = ["Muestra Gratis de Producto Petrizzio", "Espejo de Bolsillo Exclusivo"];
                midRewards.forEach(item => {
                    optionsContainer.innerHTML += createCardHTML(item);
                });

            } else if (scannedCount >= 5) {
                tierTitle.innerText = "🎁 Tramo 5+ Envases: ¡PREMIO ECO-PREMIUM!";
                
                // Premio único directo
                optionsContainer.innerHTML = createCardHTML("Cosmetiquero de Tela Reciclada Petrizzio", true);
                selectedReward = "Cosmetiquero de Tela Reciclada Petrizzio";
            }
        }

        // Helper para crear las tarjetas de opciones de forma limpia
        function createCardHTML(itemName, isAutoSelected = false) {
            const activeClass = isAutoSelected ? 'selected' : '';
            return `
                <div class="reward-card ${activeClass}" onclick="selectOption(this, '${itemName}')">
                    <h4>${itemName}</h4>
                </div>
            `;
        }

        // Maneja la selección visual del usuario en la pantalla táctil
        function selectOption(element, rewardName) {
            // Deseleccionar los otros del contenedor
            const cards = document.querySelectorAll('.reward-card');
            cards.forEach(card => card.classList.remove('selected'));
            
            // Seleccionar el actual
            element.classList.add('selected');
            selectedReward = rewardName;
        }

        // Acción final del botón del Tótem
        function claimReward() {
            if (!selectedReward) {
                alert("Por favor, selecciona una opción en la pantalla táctil antes de continuar.");
                return;
            }
            alert(`🎉 ¡Procesando! La compuerta del dispensador se abrirá. \nHas obtenido: ${selectedReward}.\n\n¡Gracias por reciclar con Petrizzio!`);
            resetTotem();
        }

        // Reinicia el estado del tótem para el siguiente cliente
        function resetTotem() {
            scannedCount = 0;
            selectedReward = "";
            document.getElementById('count').innerText = "0";
            document.getElementById('rewardsSection').style.display = 'none';
        }
    </script>
</body>
</html>
